<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n-document-title="galleryPage.title"></title>
  <meta name="description" content="" data-i18n-document-description="galleryPage.description">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/print.css" media="print">
</head>
<body data-page="gallery">
  <a class="skip-link" href="#main-content" data-i18n="nav.skipToContent"></a>
  <div class="site-shell">
    <header class="site-header no-print">
      <a class="brand" href="../index.html" data-i18n-aria-label="nav.brandHome">
        <span class="brand-kicker">AgInno Institute</span>
        <span class="brand-title" data-i18n="nav.brandTitle"></span>
      </a>
      <div class="header-actions">
        <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav" data-i18n-aria-label="nav.menuToggleAria">
          <span class="menu-toggle__icon" aria-hidden="true"></span>
        </button>
      </div>
      <nav id="site-nav" class="site-nav" data-i18n-aria-label="nav.primaryNav">
        <a href="../index.html" data-i18n="nav.overview"></a>
        <a href="specs.html" data-i18n="nav.specs"></a>
        <a href="gallery.html" data-i18n="nav.gallery" aria-current="page"></a>
        <a href="simulator.html" data-i18n="nav.simulator"></a>
        <div class="lang-switch" role="group" data-i18n-aria-label="nav.language">
          <button type="button" class="lang-switch__button" data-lang-choice="en">EN</button>
          <button type="button" class="lang-switch__button" data-lang-choice="es">ES</button>
        </div>
      </nav>
    </header>

    <main id="main-content">
      <section id="gallery-hero" class="hero-panel" aria-labelledby="gallery-hero-heading">
        <div class="hero-copy">
          <p class="eyebrow" data-i18n="galleryPage.eyebrow"></p>
          <h1 id="gallery-hero-heading" data-i18n="galleryPage.heading"></h1>
          <p class="hero-text" data-i18n="galleryPage.body"></p>
        </div>
      </section>

      <section id="gallery-jump" class="section-block no-print" data-i18n-aria-label="galleryPage.jumpLinksAria">
        <div class="pill-row" id="gallery-jump-links"></div>
      </section>

      <section id="gallery-story" class="section-block" aria-labelledby="gallery-story-heading">
        <div class="section-heading">
          <p class="eyebrow" data-i18n="galleryPage.storyEyebrow"></p>
          <h2 id="gallery-story-heading" data-i18n="galleryPage.storyHeading"></h2>
        </div>
        <div id="gallery-sections" class="gallery-sections"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-meta">
        <p data-i18n="galleryPage.footerLead"></p>
        <p><span id="current-year"></span> • <span data-i18n="galleryPage.footerStack"></span></p>
      </div>
      <nav class="footer-nav" data-i18n-aria-label="nav.footerNav">
        <a href="../index.html" data-i18n="nav.overview"></a>
        <a href="specs.html" data-i18n="nav.specs"></a>
        <a href="gallery.html" data-i18n="nav.gallery" aria-current="page"></a>
        <a href="simulator.html" data-i18n="nav.simulator"></a>
      </nav>
    </footer>
  </div>

  <script src="../js/i18n.js"></script>
  <script src="../js/data/firmware-config.js"></script>
  <script src="../js/data/screens.js"></script>
  <script src="../js/data/specs.js"></script>
  <script src="../js/data/led-rules.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
